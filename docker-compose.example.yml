services:
  moonbridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: moonbridge:local
    container_name: moonbridge
    restart: unless-stopped
    command:
      - -config
      - /config/config.yml
      - -addr
      - 0.0.0.0:38440
    ports:
      - "127.0.0.1:38440:38440"
    volumes:
      - ./config.yml:/config/config.yml:ro
      - ./plugins:/config/plugins:ro
      - ./logs:/app/logs
      - ./trace:/app/trace
    healthcheck:
      test:
        - CMD
        - /app/moonbridge
        - -config
        - /config/config.yml
        - -addr
        - 0.0.0.0:38440
        - -print-addr
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s