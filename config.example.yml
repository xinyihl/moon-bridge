mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

server:
  addr: "127.0.0.1:38440"

trace_requests: false

provider:
  base_url: "https://provider.example.com"
  api_key: "replace-with-provider-api-key"
  version: "2023-06-01"
  default_max_tokens: 1024
  default_model: "moonbridge"
  models:
    moonbridge:
      name: "provider-model-name"
      context_window: 200000
      max_output_tokens: 100000

cache:
  mode: "automatic" # off / automatic / explicit / hybrid
  ttl: "5m"         # 5m / 1h
  prompt_caching: true
  automatic_prompt_cache: true
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048

developer:
  proxy:
    response:
      provider:
        base_url: "https://api.openai.com"
        api_key: "replace-with-real-openai-compatible-api-key"
    anthropic:
      model: "provider-model-name"
      provider:
        base_url: "https://provider.example.com"
        api_key: "replace-with-real-anthropic-compatible-api-key"
        version: "2023-06-01"
