mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

log:
  level: "info"  # debug / info / warn / error
  format: "text" # text / json

# 桥接层注入的系统提示词，会追加到 Anthropic system 字段末尾。
# 用于向非 Codex 训练的模型传递项目特定指令（如沙箱权限提升指南）。
# system_prompt: ""

server:
  addr: "127.0.0.1:38440"

trace_requests: false

provider:
  # 多 Provider 模式（推荐）：在 providers 下定义一个或多个上游 Provider
  providers:
    deepseek:
      base_url: "https://api.deepseek.com"
      api_key: "${DEEPSEEK_API_KEY}"
      version: "2023-06-01"
      user_agent: "moonbridge/1.0"
    openai:
      base_url: "https://api.openai.com"
      api_key: "${OPENAI_API_KEY}"
      protocol: "openai"
      user_agent: "moonbridge/1.0"
    anthropic:
      base_url: "https://api.anthropic.com"
      api_key: "${ANTHROPIC_API_KEY}"
      version: "2023-06-01"
      user_agent: "moonbridge/1.0"

  # 模型路由：每个别名指定其 Provider 和上游模型名
  models:
    moonbridge:
      provider: "deepseek"
      name: "deepseek-v4-pro"
      context_window: 1000000
      max_output_tokens: 384000
      pricing:
        input_price: 2
        output_price: 8
        cache_write_price: 1
        cache_read_price: 0.2
    gpt-image:
      provider: "openai"
      name: "gpt-image-1.5"
    gpt-tts:
      provider: "openai"
      name: "gpt-4o-mini-tts"

  # 单 Provider 写法（代码仍可解析；新配置推荐使用上方 providers）
  # base_url: "https://api.example.com"
  # api_key: "replace-with-deepseek-api-key"
  # version: "2023-06-01"
  # user_agent: "claude-cli/2.1.112 (external, cli)"

  web_search:
    support: "disabled" # auto / enabled / disabled / injected
    max_uses: 8
    tavily_api_key: "replace-with-tavily-api-key"
    firecrawl_api_key: "replace-with-firecrawl-api-key"
    search_max_rounds: 5
  default_max_tokens: 65536
  default_model: "moonbridge"
  deepseek_v4: true  # Enable DeepSeek thinking_mode extension

cache:
  mode: "explicit"  # off / automatic / explicit / hybrid
  ttl: "5m"         # 5m / 1h
  prompt_caching: true
  automatic_prompt_cache: false
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048

developer:
  proxy:
    response:
      model: "gpt-5.4"
      provider:
        base_url: "https://api.openai.com"
        api_key: "replace-with-real-openai-compatible-api-key"
    anthropic:
      model: ""
      provider:
        base_url: "https://provider.example.com"
        api_key: "replace-with-real-anthropic-compatible-api-key"
        version: "2023-06-01"
