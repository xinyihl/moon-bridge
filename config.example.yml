mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

log:
  level: "info"  # debug / info / warn / error
  format: "text" # text / json

# system_prompt: ""

server:
  addr: "127.0.0.1:38440"

trace_requests: false

provider:
  providers:
    deepseek:
      base_url: "https://api.deepseek.com"
      api_key: "replace-with-deepseek-api-key"
      version: "2023-06-01"
      user_agent: "moonbridge/1.0"
      deepseek_v4: true
      web_search:
        support: "disabled"
      models:
        deepseek-v4-pro:
          context_window: 1000000
          max_output_tokens: 384000
          pricing:
            input_price: 2
            output_price: 8
            cache_write_price: 1
            cache_read_price: 0.2
    openai:
      base_url: "https://api.openai.com"
      api_key: "replace-with-openai-api-key"
      protocol: "openai"
      user_agent: "moonbridge/1.0"
      models:
        gpt-image-1.5: {}
        gpt-4o-mini-tts: {}
    anthropic:
      base_url: "https://api.anthropic.com"
      api_key: "replace-with-anthropic-api-key"
      version: "2023-06-01"
      user_agent: "moonbridge/1.0"
      web_search:
        support: "enabled"

  routes:
    moonbridge: "deepseek/deepseek-v4-pro"
    gpt-image: "openai/gpt-image-1.5"
    gpt-tts: "openai/gpt-4o-mini-tts"

  # web_search:
  #   support: "disabled" # auto / enabled / disabled / injected
  #   max_uses: 8
  #   tavily_api_key: "replace-with-tavily-api-key"
  #   firecrawl_api_key: "replace-with-firecrawl-api-key"
  #   search_max_rounds: 5
  default_max_tokens: 65536
  default_model: "moonbridge"

cache:
  mode: "explicit"  # off / automatic / explicit / hybrid
  ttl: "5m"         # 5m / 1h
  prompt_caching: true
  automatic_prompt_cache: false
  explicit_cache_breakpoints: true
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048
  min_breakpoint_tokens: 1024

developer:
  proxy:
    response:
      model: "gpt-5.4"
      provider:
        base_url: "https://api.openai.com"
        api_key: "replace-with-real-openai-compatible-api-key"
    anthropic:
      model: ""
      provider:
        base_url: "https://provider.example.com"
        api_key: "replace-with-real-anthropic-compatible-api-key"
        version: "2023-06-01"
