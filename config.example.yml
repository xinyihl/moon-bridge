mode: "Transform" # Transform / CaptureAnthropic / CaptureResponse

log:
  level: "info"  # debug / info / warn / error
  format: "text" # text / json

# 桥接层注入的系统提示词，会追加到 Anthropic system 字段末尾。
# 用于向非 Codex 训练的模型传递项目特定指令（如沙箱权限提升指南）。
# system_prompt: ""

server:
  addr: "127.0.0.1:38440"

trace_requests: false

provider:
  base_url: "https://api.example.com"
  api_key: "replace-with-deepseek-api-key"
  version: "2023-06-01"
  user_agent: "claude-cli/2.1.112 (external, cli)"
  web_search:
    support: "disabled" # auto / enabled / disabled / injected
    # injected: bridge injects tavily_search/firecrawl_fetch as function tools
    # and executes them server-side via Tavily/Firecrawl APIs. Requires tavily_api_key.
    # Useful when the upstream Anthropic provider does not support web_search_20250305.
    max_uses: 8
    tavily_api_key: "replace-with-tavily-api-key"
    firecrawl_api_key: "replace-with-firecrawl-api-key"
    search_max_rounds: 5
  default_max_tokens: 65536
  default_model: "moonbridge"
  deepseek_v4: true  # Enable DeepSeek thinking_mode extension for Codex/OpenAI reasoning requests.
  models:
    moonbridge:
      name: "deepseek-v4-pro"
      context_window: 1000000
      max_output_tokens: 384000
      # Optional per-model pricing in RMB per 1K tokens.
      # When configured, session summary includes cost breakdown.
      pricing:
        input_price: 2
        output_price: 8
        cache_write_price: 1
        cache_read_price: 0.2

cache:
  mode: "explicit"  # off / automatic / explicit / hybrid
  ttl: "5m"         # 5m / 1h
  prompt_caching: true
  automatic_prompt_cache: false    # top-level request cache_control; enable only when the provider supports it well
  explicit_cache_breakpoints: true  # block-level cache_control on tools/system/messages, matching Claude Code captures
  allow_retention_downgrade: false
  max_breakpoints: 4
  min_cache_tokens: 1024
  expected_reuse: 2
  minimum_value_score: 2048

developer:
  proxy:
    response:
      model: "gpt-5.4"
      provider:
        base_url: "https://api.openai.com"
        api_key: "replace-with-real-openai-compatible-api-key"
    anthropic:
      model: "" # optional; leave empty to use Claude Code settings/default model
      provider:
        base_url: "https://provider.example.com"
        api_key: "replace-with-real-anthropic-compatible-api-key"
        version: "2023-06-01"
